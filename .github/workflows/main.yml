name: Android CI
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.1

    - name: Build with Gradle
      # Humne GitHub ko bataya ki code 'avdb_final' folder ke andar hai
      run: gradle assembleDebug --stacktrace
      working-directory: ./avdb_final 

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AllVideoDownloader-APK
        # Path bhi folder ke hisaab se update kiya
        path: avdb_final/app/build/outputs/apk/debug/app-debug.apk
        
