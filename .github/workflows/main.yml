name: Android CI
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.1

    - name: Find and Build Project
      run: |
        # Ye command project folder ko auto-detect karegi
        PROJECT_DIR=$(find . -name "build.gradle" -not -path "*/app/*" -exec dirname {} \;)
        echo "Project found in: $PROJECT_DIR"
        cd $PROJECT_DIR
        gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AllVideoDownloader-APK
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
        
